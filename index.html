<body>
  <nav></nav>
  <main></main>
</body>

<script src="https://cdn.jsdelivr.net/gh/netizenorg/netnet-standard-library/build/nn.min.js"></script>
<script>
  /* global nn */

  // this function will save and download the content in 
  // our <main> element as an HTML file (local web page)
  function save () {
    const doc = nn.get('main').innerHTML
    const blob = new Blob([doc], {
      type: 'text/html'
    })
    const url = URL.createObjectURL(blob)
    const a = nn.create('a')
      .set('href', url)
      .set('download', 'web-drawing.html')
      .addTo('nav')
    a.click()
    a.remove()
    URL.revokeObjectURL(url)
  }

  // this function will place a character from the poem 静夜思 whenever
  // our mouse is when we click+drag on the page
  function draw () {
    // if mouse is not (!) pressed down exit function
    if  (!nn.mouseDown) return
    // otherwise, place a new character
    let poem = ['床', '前', '明', '月', '光', '疑', '是', '地', '上', '霜', '举', '头', '望', '明', '月', '低', '头', '思', '故', '乡']
    let randomChar = poem[Math.floor(Math.random() * poem.length)]
    let hue = nn.random(-15, 15)

    nn.create('div')
      .content(randomChar)
      .css('font-size', nn.random(40, 120) + 'px')
      .css('color', 'gold')
      .css('text-shadow', '0 0 10px gold')
      .hueRotate(hue)
      .css('font-family', 'serif')
      .css('user-select', 'none')
      .position(nn.mouseX, nn.mouseY)
      .rotate(nn.random(-15, 15))
      .addTo('main')
  }

  nn.get('main').css('background', 'navy').css('min-height', '100vh')


  // here we create our save button
  nn.create('button')
    .content('save')
    .addTo('nav')
    .on('click', save)

  // here we setup our mouse move listener
  nn.on('mousemove', draw)
</script>
